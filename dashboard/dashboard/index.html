<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>MOT Dashboard</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">Microlino Open Telemetry</div>
        <h1>MOT Dashboard</h1>
      </div>
      <div class="status-pill" id="mqttStatus">MQTT offline</div>
    </header>

    <main class="grid">
      <section class="card hero-card">
        <div class="card-label">State of Charge</div>
        <div class="soc-row">
          <div class="soc-value"><span id="socValue">--</span><span>%</span></div>
          <div class="soc-ring" aria-hidden="true"><div id="socRingFill"></div></div>
        </div>
        <div class="bar"><div id="socBar"></div></div>
        <div class="muted">Last update: <span id="lastUpdate">never</span></div>
      </section>

      <section class="card metric"><span>Range</span><strong><span id="rangeValue">--</span> km</strong></section>
      <section class="card metric"><span>Speed</span><strong><span id="speedValue">--</span> km/h</strong></section>
      <section class="card metric"><span>Odometer</span><strong><span id="odoValue">--</span> km</strong></section>
      <section class="card metric"><span>Charging</span><strong id="chargingValue">--</strong></section>
      <section class="card metric"><span>Power display</span><strong id="powerValue">--</strong></section>

      <section class="card wide">
        <h2>System</h2>
        <dl class="system-list">
          <div><dt>Vehicle</dt><dd id="vehicleValue">--</dd></div>
          <div><dt>Broker</dt><dd id="brokerValue">--</dd></div>
          <div><dt>Topic</dt><dd id="topicValue">--</dd></div>
          <div><dt>Device</dt><dd id="deviceValue">--</dd></div>
          <div><dt>Firmware</dt><dd id="firmwareValue">--</dd></div>
          <div><dt>IP</dt><dd id="ipValue">--</dd></div>
          <div><dt>RSSI</dt><dd id="rssiValue">--</dd></div>
        </dl>
      </section>

      <section class="card wide">
        <div class="section-head">
          <h2>MQTT Monitor</h2>
          <button id="clearLog" type="button">Clear</button>
        </div>
        <pre id="mqttLog" class="log"></pre>
      </section>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="js/mqtt.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
