<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MOT Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <h1>MOT Dashboard</h1>
        <p>Microlino Open Telemetry</p>
      </div>
      <div id="connection" class="pill offline">offline</div>
    </header>

    <section class="hero card">
      <div class="label">State of Charge</div>
      <div class="soc"><span id="soc">--</span><small>%</small></div>
      <div class="bar"><div id="socBar" class="bar-fill"></div></div>
    </section>

    <section class="grid">
      <div class="card metric"><span>Range</span><strong id="range">--</strong><small>km</small></div>
      <div class="card metric"><span>Speed</span><strong id="speed">--</strong><small>km/h</small></div>
      <div class="card metric"><span>ODO</span><strong id="odo">--</strong><small>km</small></div>
      <div class="card metric"><span>Charging</span><strong id="charging">--</strong><small id="power">power --</small></div>
    </section>

    <section class="card status">
      <h2>System</h2>
      <div><span>Vehicle</span><strong id="vehicle">--</strong></div>
      <div><span>Device</span><strong id="device">--</strong></div>
      <div><span>Firmware</span><strong id="firmware">--</strong></div>
      <div><span>Last update</span><strong id="lastUpdate">never</strong></div>
    </section>

    <section class="card settings">
      <h2>MQTT</h2>
      <label>WebSocket URL <input id="mqttUrl" placeholder="wss://mqtt.example.com:9001"></label>
      <label>Username <input id="mqttUser"></label>
      <label>Password <input id="mqttPass" type="password"></label>
      <label>Topic prefix <input id="mqttPrefix" value="mot/pioneer"></label>
      <button id="connectBtn">Connect</button>
    </section>
  </main>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
