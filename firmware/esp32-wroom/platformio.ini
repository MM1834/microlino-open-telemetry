[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_extra_dirs = ../shared-libs

build_flags =
  -D CAN_RX_PIN=27
  -D CAN_TX_PIN=26
  -I src/common
  -I include

build_src_filter =
  +<*>
  +<common/**>

lib_deps =
  PubSubClient @ ^2.8
  ArduinoJson @ ^7.4.3


[env:esp32dev-aws]
extends = env:esp32dev
board_build.filesystem = littlefs
build_flags =
  ${env:esp32dev.build_flags}
  -D MOT_AWS_IOT=1
