<div class="card">
  <h3>MQTT Diagnose</h3>
  <p>Prüft WiFi, DNS, TCP-Port und MQTT-Login mit der aktuellen Konfiguration.</p>
  <button type="button" onclick="testMqtt()">Test Connection</button>
  <pre id="mqtt-test-result" style="white-space:pre-wrap;margin-top:1rem;"></pre>
</div>

<script>
async function testMqtt() {
  const out = document.getElementById('mqtt-test-result');
  out.textContent = 'Teste MQTT-Verbindung…';

  try {
    const res = await fetch('/api/mqtt-test');
    const data = await res.json();

    out.textContent =
`Host      : ${data.host}
Port      : ${data.port}
IP        : ${data.resolvedIp || '--'}

WiFi      : ${data.wifiConnected ? 'OK' : 'FAIL'}
DNS       : ${data.dnsOk ? 'OK' : 'FAIL'}
TCP       : ${data.tcpOk ? 'OK' : 'FAIL'}
MQTT      : ${data.mqttOk ? 'OK' : 'FAIL'}

RC        : ${data.mqttState}
Message   : ${data.message}
Duration  : ${data.durationMs} ms`;
  } catch (err) {
    out.textContent = 'Fehler beim MQTT-Test: ' + err.message;
  }
}
</script>
