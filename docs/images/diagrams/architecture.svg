<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Microlino Open Telemetry high-level architecture</title>
  <desc id="desc">High-level architecture diagram showing CAN input, firmware telemetry processing, Web UI, MQTT, ABRP and network transports.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .group { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; }
      .group-title { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .box { fill: #eef2ff; stroke: #818cf8; stroke-width: 1.5; rx: 12; }
      .box2 { fill: #ecfeff; stroke: #06b6d4; stroke-width: 1.5; rx: 12; }
      .box3 { fill: #f0fdf4; stroke: #22c55e; stroke-width: 1.5; rx: 12; }
      .box4 { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.5; rx: 12; }
      .box5 { fill: #fef2f2; stroke: #f87171; stroke-width: 1.5; rx: 12; }
      .text { font: 600 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 500 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; text-anchor: middle; dominant-baseline: middle; }
      .note { font: 500 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow); }
      .arrow-muted { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6 5; marker-end: url(#arrow-muted); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrow-muted" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text x="640" y="42" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#0f172a" text-anchor="middle">Microlino Open Telemetry – High-level Architecture</text>
  <text x="640" y="70" class="note" text-anchor="middle">CAN → Decoder → Telemetry → Web UI / MQTT / ABRP</text>

  <rect x="40" y="120" width="205" height="175" class="group"/>
  <text x="62" y="150" class="group-title">Microlino</text>
  <rect x="285" y="120" width="430" height="485" class="group"/>
  <text x="307" y="150" class="group-title">MOT firmware</text>
  <rect x="755" y="120" width="205" height="305" class="group"/>
  <text x="777" y="150" class="group-title">Network</text>
  <rect x="1000" y="120" width="240" height="395" class="group"/>
  <text x="1022" y="150" class="group-title">External services</text>

  <rect x="72" y="185" width="140" height="70" class="box"/>
  <text x="142" y="215" class="text">Display CAN</text>
  <text x="142" y="238" class="small">Microlino bus</text>

  <rect x="320" y="185" width="150" height="70" class="box"/>
  <text x="395" y="215" class="text">TWAI / CAN</text>
  <text x="395" y="238" class="small">transceiver</text>
  <rect x="525" y="185" width="150" height="70" class="box"/>
  <text x="600" y="215" class="text">CAN decoder</text>
  <text x="600" y="238" class="small">engine</text>
  <rect x="425" y="300" width="170" height="75" class="box2"/>
  <text x="510" y="330" class="text">Shared telemetry</text>
  <text x="510" y="354" class="small">state model</text>

  <rect x="320" y="455" width="150" height="65" class="box3"/>
  <text x="395" y="480" class="text">Status JSON</text>
  <text x="395" y="502" class="small">diagnostics</text>
  <rect x="520" y="455" width="150" height="65" class="box3"/>
  <text x="595" y="480" class="text">Local Web UI</text>
  <text x="595" y="502" class="small">config + OTA</text>
  <rect x="320" y="540" width="150" height="45" class="box4"/>
  <text x="395" y="563" class="text">MQTT</text>
  <rect x="520" y="540" width="150" height="45" class="box5"/>
  <text x="595" y="563" class="text">ABRP</text>

  <rect x="790" y="200" width="135" height="65" class="box3"/>
  <text x="858" y="225" class="text">WiFi</text>
  <text x="858" y="247" class="small">stable path</text>
  <rect x="790" y="320" width="135" height="65" class="box4"/>
  <text x="858" y="345" class="text">LTE modem</text>
  <text x="858" y="367" class="small">LilyGO</text>

  <rect x="1032" y="190" width="175" height="70" class="box3"/>
  <text x="1120" y="218" class="text">MQTT broker</text>
  <text x="1120" y="241" class="small">ioBroker / cloud</text>
  <rect x="1032" y="315" width="175" height="70" class="box5"/>
  <text x="1120" y="343" class="text">ABRP API</text>
  <text x="1120" y="366" class="small">telemetry endpoint</text>
  <rect x="1032" y="430" width="175" height="65" class="box2"/>
  <text x="1120" y="455" class="text">Browser</text>
  <text x="1120" y="477" class="small">local diagnostics</text>

  <path class="arrow" d="M212 220 H320"/>
  <path class="arrow" d="M470 220 H525"/>
  <path class="arrow" d="M600 255 C600 285 550 285 520 300"/>
  <path class="arrow" d="M470 375 C430 410 405 420 395 455"/>
  <path class="arrow" d="M550 375 C580 410 590 420 595 455"/>
  <path class="arrow" d="M470 375 C400 430 390 500 395 540"/>
  <path class="arrow" d="M550 375 C615 430 610 500 595 540"/>

  <path class="arrow" d="M470 563 C610 563 690 232 790 232"/>
  <path class="arrow-muted" d="M470 563 C630 590 720 375 790 352"/>
  <path class="arrow" d="M670 563 C735 520 780 270 790 232"/>
  <path class="arrow-muted" d="M670 563 C750 555 785 400 790 352"/>

  <path class="arrow" d="M925 232 H1032"/>
  <path class="arrow" d="M925 232 C980 250 990 330 1032 350"/>
  <path class="arrow-muted" d="M925 352 C970 350 990 350 1032 350"/>
  <path class="arrow-muted" d="M925 352 C970 305 990 245 1032 225"/>

  <path class="arrow" d="M670 488 C820 488 900 463 1032 463"/>
  <path class="arrow" d="M470 488 C700 520 900 500 1032 463"/>

  <rect x="40" y="650" width="1200" height="70" class="group"/>
  <text x="65" y="675" class="group-title">Legend</text>
  <line x1="170" y1="676" x2="230" y2="676" class="arrow"/>
  <text x="330" y="676" class="note">stable / implemented path</text>
  <line x1="510" y1="676" x2="570" y2="676" class="arrow-muted"/>
  <text x="710" y="676" class="note">experimental or planned path</text>
  <text x="65" y="705" class="note">ABRP over WiFi is implemented. ABRP over LTE is planned. MQTT over LTE is experimental until field-tested.</text>
</svg>
