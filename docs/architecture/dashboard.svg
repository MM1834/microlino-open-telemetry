<svg xmlns="http://www.w3.org/2000/svg" width="1430" height="390" viewBox="0 0 1430 390" role="img" aria-labelledby="title desc">
<title id="title">Dashboard data flow</title>
<desc id="desc">Dashboard data flow for Microlino Open Telemetry</desc>
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker>
<style><![CDATA[
.box{fill:#ffffff;stroke:#334155;stroke-width:2;rx:12;ry:12}
.group{fill:#f8fafc;stroke:#94a3b8;stroke-width:2;stroke-dasharray:7 5;rx:16;ry:16}
.title{font:700 24px Arial,sans-serif;fill:#0f172a}
.label{font:700 16px Arial,sans-serif;fill:#0f172a}
.small{font:14px Arial,sans-serif;fill:#334155}
.tiny{font:12px Arial,sans-serif;fill:#475569}
.arrow{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
.subarrow{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#arrow)}
]]></style>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text class="title" x="30" y="38">Dashboard data flow</text>
<rect class="box" x="40" y="110" width="190" height="90"/>
<text class="label" x="135.0" y="140" text-anchor="middle">Browser</text>
<text class="small" x="135.0" y="162" text-anchor="middle">MOT Dashboard</text>
<rect class="box" x="290" y="80" width="220" height="90"/>
<text class="label" x="400.0" y="110" text-anchor="middle">Vehicle list</text>
<text class="small" x="400.0" y="132" text-anchor="middle">GET /api/vehicles</text>
<rect class="box" x="290" y="220" width="220" height="90"/>
<text class="label" x="400.0" y="250" text-anchor="middle">Vehicle snapshot</text>
<text class="small" x="400.0" y="272" text-anchor="middle">GET /api/vehicles/{id}/snapshot</text>
<rect class="box" x="580" y="80" width="210" height="90"/>
<text class="label" x="685.0" y="110" text-anchor="middle">Vehicle selector</text>
<text class="small" x="685.0" y="132" text-anchor="middle">one or more vehicle IDs</text>
<rect class="box" x="580" y="220" width="210" height="90"/>
<text class="label" x="685.0" y="250" text-anchor="middle">Provider mapping</text>
<text class="small" x="685.0" y="272" text-anchor="middle">topic suffix -&gt; UI state</text>
<rect class="box" x="860" y="80" width="210" height="90"/>
<text class="label" x="965.0" y="110" text-anchor="middle">Cloud status</text>
<text class="small" x="965.0" y="132" text-anchor="middle">API connectivity</text>
<rect class="box" x="860" y="220" width="210" height="90"/>
<text class="label" x="965.0" y="250" text-anchor="middle">Vehicle status</text>
<text class="small" x="965.0" y="272" text-anchor="middle">online · stale · offline</text>
<rect class="box" x="1140" y="150" width="250" height="110"/>
<text class="label" x="1265.0" y="180" text-anchor="middle">Dashboard cards</text>
<text class="small" x="1265.0" y="202" text-anchor="middle">SOC · ODO · charging</text>
<text class="small" x="1265.0" y="220" text-anchor="middle">network · location · diagnostics</text>
<path class="arrow" d="M230,155 L290,125"/>
<path class="arrow" d="M230,155 L290,265"/>
<path class="arrow" d="M510,125 L580,125"/>
<path class="arrow" d="M510,265 L580,265"/>
<path class="arrow" d="M790,125 L860,125"/>
<path class="arrow" d="M790,265 L860,265"/>
<path class="arrow" d="M1070,125 L1140,190"/>
<path class="arrow" d="M1070,265 L1140,220"/>
</svg>