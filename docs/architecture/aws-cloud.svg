<svg xmlns="http://www.w3.org/2000/svg" width="1490" height="430" viewBox="0 0 1490 430" role="img" aria-labelledby="title desc">
<title id="title">AWS cloud architecture</title>
<desc id="desc">AWS cloud architecture for Microlino Open Telemetry</desc>
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker>
<style><![CDATA[
.box{fill:#ffffff;stroke:#334155;stroke-width:2;rx:12;ry:12}
.group{fill:#f8fafc;stroke:#94a3b8;stroke-width:2;stroke-dasharray:7 5;rx:16;ry:16}
.title{font:700 24px Arial,sans-serif;fill:#0f172a}
.label{font:700 16px Arial,sans-serif;fill:#0f172a}
.small{font:14px Arial,sans-serif;fill:#334155}
.tiny{font:12px Arial,sans-serif;fill:#475569}
.arrow{stroke:#475569;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
.subarrow{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#arrow)}
]]></style>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text class="title" x="30" y="38">AWS cloud architecture</text>
<rect class="box" x="40" y="110" width="190" height="90"/>
<text class="label" x="135.0" y="140" text-anchor="middle">MOT device</text>
<text class="small" x="135.0" y="162" text-anchor="middle">Thing + certificate</text>
<rect class="box" x="290" y="110" width="190" height="90"/>
<text class="label" x="385.0" y="140" text-anchor="middle">AWS IoT Core</text>
<text class="small" x="385.0" y="162" text-anchor="middle">MQTT/TLS endpoint</text>
<rect class="box" x="540" y="110" width="190" height="90"/>
<text class="label" x="635.0" y="140" text-anchor="middle">IoT Rule</text>
<text class="small" x="635.0" y="162" text-anchor="middle">SELECT FROM &#x27;mot/#&#x27;</text>
<rect class="box" x="790" y="110" width="190" height="90"/>
<text class="label" x="885.0" y="140" text-anchor="middle">State ingest</text>
<text class="small" x="885.0" y="162" text-anchor="middle">Lambda</text>
<rect class="box" x="1040" y="110" width="200" height="90"/>
<text class="label" x="1140.0" y="140" text-anchor="middle">DynamoDB</text>
<text class="small" x="1140.0" y="162" text-anchor="middle">vehicleId + topicSuffix</text>
<rect class="box" x="790" y="285" width="190" height="90"/>
<text class="label" x="885.0" y="315" text-anchor="middle">Vehicle API</text>
<text class="small" x="885.0" y="337" text-anchor="middle">read-only Lambda</text>
<rect class="box" x="1040" y="285" width="200" height="90"/>
<text class="label" x="1140.0" y="315" text-anchor="middle">API Gateway</text>
<text class="small" x="1140.0" y="337" text-anchor="middle">HTTP API</text>
<rect class="box" x="1290" y="285" width="160" height="90"/>
<text class="label" x="1370.0" y="315" text-anchor="middle">Dashboard</text>
<text class="small" x="1370.0" y="337" text-anchor="middle">HTTPS client</text>
<path class="arrow" d="M230,155 L290,155"/>
<text class="tiny" x="260.0" y="147.0" text-anchor="middle">MQTT/TLS</text>
<path class="arrow" d="M480,155 L540,155"/>
<path class="arrow" d="M730,155 L790,155"/>
<path class="arrow" d="M980,155 L1040,155"/>
<path class="arrow" d="M1140,200 L885,285"/>
<text class="tiny" x="1012.5" y="234.5" text-anchor="middle">Query</text>
<path class="arrow" d="M980,330 L1040,330"/>
<path class="arrow" d="M1240,330 L1290,330"/>
<text class="tiny" x="1265.0" y="322.0" text-anchor="middle">HTTPS</text>
</svg>